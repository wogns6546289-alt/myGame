<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지뢰찾기 - 미니 게임 천국</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background-color: #f3f4f6; }
        .board { display: grid; gap: 2px; background-color: #94a3b8; padding: 4px; border-radius: 6px; width: max-content; margin: 0 auto; }
        .cell { width: 32px; height: 32px; background-color: #cbd5e1; border: 2px outset #f8fafc; display: flex; justify-content: center; align-items: center; font-weight: 800; cursor: pointer; color: transparent; }
        .cell.revealed { background-color: #f1f5f9; border: 1px solid #cbd5e1; cursor: default; color: #334155; }
        .cell.mine { background-color: #ef4444; color: black; }
        .cell.flagged { color: #ef4444; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 bg-white shadow-lg z-20 flex flex-col flex-shrink-0">
        <div class="p-6 border-b"><h1 class="text-2xl font-extrabold text-orange-500">미니 게임 천국</h1></div>
        <nav class="flex-1 p-4 flex flex-row md:flex-col gap-2">
            <a href="index.html" class="flex-shrink-0 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold transition-colors">🍎 과일 팡팡</a>
            <a href="index2.html" class="flex-shrink-0 px-4 py-3 bg-orange-100 text-orange-600 rounded-xl font-bold transition-colors">💣 지뢰찾기</a>
        </nav>
    </aside>

    <main class="flex-1 p-6 flex flex-col items-center">
        <h2 class="text-2xl mb-6">지뢰찾기</h2>
        <div class="mb-4 text-lg font-bold" id="status">지뢰: 10개</div>
        <button onclick="initGame()" class="mb-6 bg-blue-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-600 transition">새 게임 시작</button>
        <div id="board" class="board"></div>
    </main>

    <script>
        const ROWS = 10, COLS = 10, MINES = 10;
        let board = [], gameOver = false;
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        function initGame() {
            boardElement.innerHTML = '';
            boardElement.style.gridTemplateColumns = `repeat(${COLS}, 32px)`;
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0).map(() => ({ mine: false, revealed: false, flagged: false, count: 0 })));
            gameOver = false;
            statusElement.innerText = `지뢰: ${MINES}개`;

            // 지뢰 배치
            let placed = 0;
            while(placed < MINES) {
                let r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
                if(!board[r][c].mine) { board[r][c].mine = true; placed++; }
            }

            // 주변 숫자 계산
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(!board[r][c].mine) {
                        for(let i=-1; i<=1; i++) {
                            for(let j=-1; j<=1; j++) {
                                if(r+i>=0 && r+i<ROWS && c+j>=0 && c+j<COLS && board[r+i][c+j].mine) board[r][c].count++;
                            }
                        }
                    }
                }
            }

            // UI 생성
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => reveal(r, c);
                    cell.oncontextmenu = (e) => { e.preventDefault(); flag(r, c); };
                    boardElement.appendChild(cell);
                    board[r][c].el = cell;
                }
            }
        }

        function reveal(r, c) {
            if(gameOver || board[r][c].revealed || board[r][c].flagged) return;
            board[r][c].revealed = true;
            board[r][c].el.classList.add('revealed');

            if(board[r][c].mine) {
                board[r][c].el.classList.add('mine');
                board[r][c].el.innerText = '💣';
                gameOver = true;
                alert('게임 오버!');
            } else {
                if(board[r][c].count > 0) board[r][c].el.innerText = board[r][c].count;
                else {
                    for(let i=-1; i<=1; i++) {
                        for(let j=-1; j<=1; j++) {
                            if(r+i>=0 && r+i<ROWS && c+j>=0 && c+j<COLS) reveal(r+i, c+j);
                        }
                    }
                }
            }
        }

        function flag(r, c) {
            if(gameOver || board[r][c].revealed) return;
            board[r][c].flagged = !board[r][c].flagged;
            board[r][c].el.innerText = board[r][c].flagged ? '🚩' : '';
            board[r][c].el.classList.toggle('flagged', board[r][c].flagged);
        }
        initGame();
    </script>
</body>
</html>
